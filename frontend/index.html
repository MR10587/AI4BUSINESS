<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI4BUSINESS Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>AI4BUSINESS</h1>

    <section id="messages" class="messages" aria-live="polite"></section>
    <div id="loading" class="loading hidden">Loading...</div>

    <section id="authSection" class="card">
      <div class="auth-toggle">
        <button id="showLoginBtn" class="btn active" type="button">Login</button>
        <button id="showRegisterBtn" class="btn" type="button">Register</button>
      </div>

      <form id="loginForm" class="form">
        <h2>Login</h2>
        <label>Email</label>
        <input id="loginEmail" type="email" required />
        <label>Password</label>
        <input id="loginPassword" type="password" required />
        <button class="btn primary" type="submit">Login</button>
      </form>

      <form id="registerForm" class="form hidden">
        <h2>Register</h2>
        <label>Name</label>
        <input id="registerName" type="text" required />
        <label>Email</label>
        <input id="registerEmail" type="email" required />
        <label>Password</label>
        <input id="registerPassword" type="password" required />
        <label>Role</label>
        <select id="registerRole" required>
          <option value="startup">startup</option>
          <option value="investor">investor</option>
          <option value="admin">admin</option>
        </select>
        <button class="btn primary" type="submit">Create account</button>
      </form>
    </section>

    <section id="dashboardSection" class="hidden">
      <div class="card topbar">
        <div id="currentUser"></div>
        <div class="actions">
          <button id="startupsTabBtn" class="btn active" type="button">Startups</button>
          <button id="kpiTabBtn" class="btn hidden" type="button">KPI</button>
          <button id="refreshBtn" class="btn" type="button">Refresh</button>
          <button id="logoutBtn" class="btn danger" type="button">Logout</button>
        </div>
      </div>

      <section id="startupsSection" class="card">
        <h2>Startups</h2>

        <form id="createStartupForm" class="form hidden">
          <h3>Create Startup</h3>
          <label>Idea</label>
          <textarea id="idea" rows="3" required></textarea>
          <label>Industry</label>
          <input id="industry" type="text" required />
          <label>Team size</label>
          <input id="teamSize" type="number" min="1" required />
          <label>Investment needed</label>
          <input id="investmentNeeded" type="number" min="0" required />
          <label>Market impact (1-10)</label>
          <input id="marketImpact" type="number" min="1" max="10" required />
          <label>Stage</label>
          <select id="stage" required>
            <option value="idea">idea</option>
            <option value="mvp">mvp</option>
            <option value="growth">growth</option>
            <option value="scale">scale</option>
          </select>
          <button class="btn primary" type="submit">Create</button>
        </form>

        <div class="filters">
          <input id="industryFilter" type="text" placeholder="Search industry..." />
          <button id="sortScoreBtn" class="btn" type="button">Sort total_score: OFF</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>id</th>
                <th>industry</th>
                <th>stage</th>
                <th>team_size</th>
                <th>investment_needed</th>
                <th>total_score</th>
                <th>rule_score</th>
                <th>ai_score</th>
                <th>risk_flags</th>
                <th>created_at</th>
                <th>action</th>
              </tr>
            </thead>
            <tbody id="startupsTbody"></tbody>
          </table>
        </div>
      </section>

      <section id="kpiSection" class="card hidden">
        <h2>Admin KPI</h2>
        <div id="kpiContent"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
